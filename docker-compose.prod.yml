services:
  condocdat:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: condocdat
    restart: unless-stopped
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-condocdat.netgogo.cl}
      - DJANGO_SETTINGS_MODULE=condocdat.settings
      # PostgreSQL en producción (mismo servidor que Talleres). Definir en .env: DB_ENGINE, DB_NAME, DB_USER, DB_PASSWORD, DB_HOST, DB_PORT
      - DB_ENGINE=${DB_ENGINE:-django.db.backends.postgresql}
      - DB_NAME=${DB_NAME:-condocdat_db}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - TZ=America/Santiago
      # Correo (Outlook/Office 365): deben existir en el .env del HOST; el contenedor no ve /app/.env
      - EMAIL_HOST=${EMAIL_HOST:-smtp.office365.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-max.gonzalez@propamat.cl}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-max.gonzalez@propamat.cl}
      - EMAIL_TIMEOUT=${EMAIL_TIMEOUT:-90}
    volumes:
      - ./data:/app/data
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    networks:
      - traefik_default
      - myproject_netgogo_default
    labels:
      traefik.enable: "true"
      traefik.http.routers.condocdat.entrypoints: "websecure"
      traefik.http.routers.condocdat.rule: "Host(`condocdat.netgogo.cl`)"
      traefik.http.routers.condocdat.tls.certresolver: "letsencrypt"
      traefik.http.services.condocdat.loadbalancer.server.port: "8000"
      traefik.http.middlewares.condocdat-headers.headers.customrequestheaders.X-Forwarded-Proto: "https"
      traefik.http.routers.condocdat.middlewares: "condocdat-headers"

networks:
  traefik_default:
    external: true
  myproject_netgogo_default:
    external: true
