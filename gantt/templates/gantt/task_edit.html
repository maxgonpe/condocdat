{% extends "base.html" %}
{% block title %}Editar tarea Gantt{% endblock %}

{% block content %}
<header class="page-header">
  <h1>Editar tarea Gantt (ID {{ obj.task_id }})</h1>
  <p class="muted"><a href="{% url 'gantt_task_list' %}">← Tareas Gantt</a></p>
</header>

<div class="card" style="max-width: 980px;">
  <form method="post">
    {% csrf_token %}
    <table class="table">
      {{ form.as_table }}
    </table>
    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="{% url 'gantt_task_list' %}" class="btn btn-outline">Cancelar</a>
  </form>
</div>
{% endblock %}
