{% extends "base.html" %}
{% block title %}Otros equipos{% endblock %}

{% block content %}
<header class="page-header">
  <h1>Otros equipos</h1>
  <p class="muted"><a href="{% url 'equipos_hub' %}">← Control de equipos</a></p>
</header>

{% if not libro %}
<p class="muted">No hay libro cargado.</p>
{% else %}
<div class="card card--list">
  <div class="form-group" style="max-width: 520px; margin-bottom: 1rem;">
    <label for="equipos-otro-search">Buscar</label>
    <input type="text" id="equipos-otro-search" class="form-control" placeholder="TAG, asset, estado, especialidad…" autocomplete="off">
  </div>
  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Fila</th>
          <th>Tipo</th>
          <th>TAG</th>
          <th>Asset</th>
          <th>Estado</th>
          <th>RDI</th>
          <th>Última edición</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="equipos-otro-tbody">
        <tr><td colspan="8" class="muted">Cargando…</td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endif %}

<script>
(function() {
  var tplEdit = '{{ url_tpl_edit|escapejs }}';
  var urlSentinel = '{{ url_sentinel|escapejs }}';
  function esc(s) {
    if (s == null) return '';
    var d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }
  var seq = 0;
  function load(q) {
    seq += 1;
    var my = seq;
    var tbody = document.getElementById('equipos-otro-tbody');
    if (!tbody) return;
    tbody.innerHTML = '<tr><td colspan="8" class="muted">Cargando…</td></tr>';
    var url = '{% url "equipos_otro_records_json" %}';
    if (q && String(q).trim()) url += '?q=' + encodeURIComponent(q.trim());
    fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (my !== seq) return;
        var recs = (data && data.records) ? data.records : [];
        if (!recs.length) {
          tbody.innerHTML = '<tr><td colspan="8" class="muted">No hay registros.</td></tr>';
          return;
        }
        tbody.innerHTML = recs.map(function(r) {
          var ult = r.ultima_cambio_fmt
            ? '<span class="equipos-ultima-cambio" title="Editado desde formulario">' + esc(r.ultima_cambio_fmt) + '</span>'
            : '<span class="muted">—</span>';
          return '<tr><td>' + esc(r.excel_row) + '</td><td>' + esc(r.row_type) + '</td><td>' + esc(r.tag_number) + '</td><td>' + esc(r.asset_name) + '</td><td>' + esc(r.estado) + '</td><td>' + esc(r.rdi_ttal) + '</td><td>' + ult + '</td><td><a class="btn btn-outline" href="' + tplEdit.split(urlSentinel).join(String(r.id)) + '">Editar</a></td></tr>';
        }).join('');
      })
      .catch(function() {
        if (my !== seq) return;
        tbody.innerHTML = '<tr><td colspan="8" class="muted">Error al cargar.</td></tr>';
      });
  }
  var inp = document.getElementById('equipos-otro-search');
  var deb;
  if (inp) {
    inp.addEventListener('input', function() {
      clearTimeout(deb);
      deb = setTimeout(function() { load(inp.value); }, 300);
    });
  }
  load('');
})();
</script>
{% endblock %}
