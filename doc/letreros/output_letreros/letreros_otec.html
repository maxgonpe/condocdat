<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Letreros otec</title>
  <style>
    @page { size: A4 portrait; margin: 5mm; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; color: #08255e; }
    .page { width: 100%; min-height: 286mm; display: flex; flex-direction: column; }
    
    .page { page-break-after: auto; }
    
    .header {
      font-weight: 700; text-align: center; font-size: 20pt;
      background: #0a2f7f; color: #ffd300; border-radius: 8px;
      padding: 6px; margin-bottom: 6px;
    }
    .cards { display: table; width: 100%; table-layout: fixed; border-spacing: 6px; }
    .cards.vertical {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    .card {
      display: block; width: 100%;
      border: 1px solid #123f9c; border-radius: 8px; padding: 8px;
      flex: 1;
    }
    .card.empty { border-style: dashed; }
    .name {
      background: #0a2f7f; color: #fff; text-align: center; font-size: 17pt;
      font-weight: 700; border-radius: 6px; padding: 6px; margin-bottom: 6px;
      min-height: 36px;
    }
    .qr-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 8px;
      table-layout: fixed;
    }
    .qr-table td {
      vertical-align: top;
      width: 50%;
      padding: 0;
    }
    .qr-box {
      display: block; width: 100%; border: 1px solid #0f5cd1;
      border-radius: 8px; padding: 8px; text-align: center;
    }
    .qr-label {
      font-size: 12pt; font-weight: 700; margin-bottom: 6px;
      color: #0f5cd1;
    }
    .qr-box img { width: 100%; max-width: 185px; height: auto; }
    .phone-label {
      margin-top: 8px;
      font-size: 13pt;
      text-align: center;
      font-weight: 700;
      color: #05286f;
    }
    .missing { color: #a00; font-weight: 700; margin: 30px 0; }
  </style>
</head>
<body>

    <section class="page">
      <div class="header">OTEC</div>
      <div class="cards vertical">
        
    <div class="card">
      <div class="name">Paulina Ramos</div>
      <table class="qr-table">
        <tr>
          <td>
    <div class="qr-box">
      <div class="qr-label">LLAMAR</div>
      <img src="file:///home/max/condocdat/doc/letreros/otec-paulina-ramos-telefono.png" alt="LLAMAR" />
    </div>
    </td>
          <td>
    <div class="qr-box">
      <div class="qr-label">WHATSAPP</div>
      <img src="file:///home/max/condocdat/doc/letreros/otec-paulina-ramos-whatsapp.png" alt="WHATSAPP" />
    </div>
    </td>
        </tr>
      </table>
      <div class="phone-label">+56 9 8234 4073</div>
    </div>
    
        <div class="card empty"></div>
      </div>
    </section>
    
</body>
</html>
